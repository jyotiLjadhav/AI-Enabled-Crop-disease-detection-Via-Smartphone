<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <meta name="theme-color" content="#1b5e20" />
  <style>
    body{margin:0;font-family:Segoe UI,system-ui,Arial,sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:560px;width:100%;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);border-radius:18px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,0.25)}
    h1{margin:0 0 8px 0;font-size:24px}
    p{margin:0 0 14px 0;line-height:1.45;color:#e0f2f1}
    .btn{display:inline-block;text-decoration:none;background:#4caf50;color:#fff;font-weight:800;padding:10px 14px;border-radius:12px}
    .small{font-size:13px;color:#cfd8dc;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>This app can open offline, but disease prediction needs an internet connection (or a running local server).</p>
    <a class="btn" href="/">Try again</a>
    <div class="small">Tip: If you're using the Desktop EXE, keep the app running and open this page again.</div>
  </div>
</body>
</html>
